name: Update READMEs

on:
  push:
    paths:
      - '.github/scripts/listings.json'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Update READMEs
        id: update
        run: |
          python .github/scripts/update_readmes.py

      - name: Check for changes
        id: check
        run: |
          # Gate on everything we are about to commit, not just the README.
          # update_readmes.py always regenerates the banner with today's date, so
          # gating on the README alone discarded a banner-only change and let the
          # committed "as of" date go stale (#112). Staging first and asking
          # `--cached` also means a run that changed nothing commits nothing.
          git add README.md assets/hackathons-banner.svg
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        env:
          COMMIT_MSG: ${{ steps.update.outputs.commit_message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "${COMMIT_MSG:-chore: update README}"
          ok=false
          for i in 1 2 3; do
            git fetch origin main || { sleep 2; continue; }
            if git rebase origin/main && git push origin main; then ok=true; break; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          $ok || { echo "::error::push failed after 3 attempts"; exit 1; }

      - name: Report failure
        if: failure()
        env:
          ERROR_MSG: ${{ steps.update.outputs.error_message }}
        run: |
          echo "Error updating README: ${ERROR_MSG:-Unknown error}"
          exit 1
