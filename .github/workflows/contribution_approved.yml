name: Contribution Approved

on:
  issues:
    types: [labeled]

concurrency:
  group: repo-writes
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process-contribution:
    # Only run for non-auto_extract issues (manual submissions)
    if: github.event.label.name == 'approved' && !contains(github.event.issue.labels.*.name, 'auto_extract') && contains(github.event.issue.labels.*.name, 'approved')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Process contribution
        id: process
        run: |
          python .github/scripts/contribution_approved.py "${{ github.event_path }}"

      - name: Update READMEs
        id: update_readme
        run: |
          python .github/scripts/update_readmes.py

      - name: Configure Git
        env:
          CONTRIBUTOR_NAME: ${{ steps.process.outputs.contributor_name }}
          CONTRIBUTOR_EMAIL: ${{ steps.process.outputs.contributor_email }}
        run: |
          git config user.name "$CONTRIBUTOR_NAME"
          git config user.email "$CONTRIBUTOR_EMAIL"

      - name: Commit and push changes
        env:
          COMMIT_MSG: ${{ steps.process.outputs.commit_message }}
        run: |
          git add .github/scripts/listings.json README.md assets/hackathons-banner.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
          fi
          # Rebase and retry push up to 3 times
          ok=false
          for i in 1 2 3; do
            git fetch origin main || { sleep 2; continue; }
            if git rebase origin/main && git push origin main; then ok=true; break; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          $ok || { echo "::error::push failed after 3 attempts"; exit 1; }

      - name: Close issue with success message
        if: success()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Your contribution has been added to the repository! Thank you for contributing!\n\nYour changes should now be visible in the README.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          ERROR_MSG: ${{ steps.process.outputs.error_message || steps.update_readme.outputs.error_message }}
        with:
          script: |
            const errorMsg = process.env.ERROR_MSG || 'Unknown error';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ There was an error processing your contribution. A maintainer will review this issue.\n\nError details: ' + errorMsg
            });
