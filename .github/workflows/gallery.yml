name: Update Gallery

on:
  push:
    paths:
      - '.github/scripts/gallery.json'
      - 'assets/gallery/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Rebuild gallery
        run: python .github/scripts/generate_gallery.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: rebuild photo gallery"
          for i in 1 2 3; do
            git fetch origin main && git rebase origin/main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
