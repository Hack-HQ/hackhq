name: Deadline Watcher

on:
  schedule:
    - cron: '0 15 * * 1'  # Mondays 15:00 UTC (~7am PT)
  workflow_dispatch:

# Review-only: reads the repo, opens an issue. Never pushes or edits listings.
permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r .github/scripts/requirements.txt

      - name: Scan listings missing a deadline
        id: scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPEN_AI }}
        run: python .github/scripts/deadline_watcher.py

      - name: Ensure label exists
        if: steps.scan.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "deadline-proposal" --color "1D76DB" \
            --description "Auto-proposed deadlines pending maintainer review" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Open review issue
        if: steps.scan.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COUNT: ${{ steps.scan.outputs.count }}
        run: |
          DATE=$(date '+%B %d, %Y')
          gh issue create \
            --title "🔎 Deadline watcher: ${COUNT} proposed deadline(s) — ${DATE}" \
            --body-file deadline_proposals.md \
            --label "deadline-proposal" \
            --repo "${{ github.repository }}"
